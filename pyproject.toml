[project]
name = "ptperf"
version = "0.1.0"
description = "Prompt Based Fine-Tuning Hardware Performance"
readme = "README.md"
requires-python = "~=3.14.3"
dependencies = [
    "transformers~=5.3.0",
    "evaluate~=0.4.6",
    "datasets~=4.8.4",
    "typer~=0.24.1",
    "torch~=2.11.0",
    "peft~=0.18.1",
]

[dependency-groups]
dev = [
    "pytest~=9.0.2",
    "ruff~=0.15.8",
    "ty~=0.0.26",
]

[project.scripts]
cli = "ptperf.cli:app"

[build-system]
requires = ["hatchling~=1.29"]
build-backend = "hatchling.build"

[tool.ruff.lint]
select = ["A", "F", "E", "W", "I", "C4", "FA", "UP", "RUF", "SIM", "ARG"]
