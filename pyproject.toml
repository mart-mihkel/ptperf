[project]
name = "ptperf"
version = "0.1.0"
description = "Prompt Based Fine-Tuning Hardware Performance"
readme = "README.md"
requires-python = "~=3.11.15"
dependencies = [
    "transformers~=5.3.0",
    "evaluate~=0.4.6",
    "datasets~=4.8.4",
    "typer~=0.24.1",
    "peft~=0.18.1",
]

[dependency-groups]
dev = [
    "pytest~=9.0.2",
    "ruff~=0.15.8",
    "ty~=0.0.26",
]

[project.optional-dependencies]
cuda = ["torch~=2.11.0"]
rocm = ["torch"]

[project.scripts]
cli = "ptperf.cli:app"

[build-system]
requires = ["hatchling~=1.29"]
build-backend = "hatchling.build"

[tool.ruff.lint]
select = ["A", "F", "E", "W", "I", "C4", "FA", "UP", "RUF", "SIM", "ARG"]

[tool.uv]
conflicts = [
    [{ extra = "cuda" }, { extra = "rocm" }],
]

[tool.uv.sources]
torch = [
    { index = "torch-cuda", extra = "cuda" },
    { index = "torch-rocm", extra = "rocm" },
]

[[tool.uv.index]]
name = "torch-cuda"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[[tool.uv.index]]
name = "torch-rocm"
url = "https://download.pytorch.org/whl/rocm7.2"
explicit = true
